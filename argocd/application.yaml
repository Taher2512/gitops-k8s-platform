apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-k8s-platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Taher2512/gitops-k8s-platform
    targetRevision: main
    path: k8s
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
